name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate JSON config & locales
        run: |
          for f in config/*.json locales/*.json; do
            python3 -c "import json; json.load(open('$f'))" && echo "$f ok"
          done
      - name: Syntax-check JS
        run: |
          for f in i18n.js app.js content.js lib/snarkdown.js; do
            node --check "$f" && echo "$f ok"
          done

  deploy:
    needs: validate
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Stamp asset version with commit SHA
        run: |
          sha="${GITHUB_SHA::7}"
          sed -i "s/__BUILD__/${sha}/g" *.html i18n.js content.js
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v5
